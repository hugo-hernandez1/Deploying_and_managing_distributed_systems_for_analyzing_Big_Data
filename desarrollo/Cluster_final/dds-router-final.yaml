apiVersion: v1
kind: ConfigMap
metadata:
  name: dds-router-final-config
data:
  router.yaml: |
    version: v4.0
    
    allowlist:
    - name: "air_quality_raw"
    - name: "air_quality_raw_fwd"
    - name: "air_quality_agg"

    blocklist:
      - name: "_fastdds_statistics_*"
    xml:
      raw: |
        <?xml version="1.0" encoding="UTF-8" ?>
        <dds>
          <profiles xmlns="http://www.eprosima.com/XMLSchemas/fastRTPS_Profiles">
            
            <participant profile_name="DSClientFinal_XML_Profile">
              <rtps>
                <name>DSClientFinal</name>
                <builtin>
                  <discovery_config>
                    <discoveryProtocol>SUPER_CLIENT</discoveryProtocol>
                    <discoveryServersList>
                      <locator>
                        <udpv4>
                          <address>10.106.45.18</address>
                          <port>11811</port>
                        </udpv4>
                      </locator>
                    </discoveryServersList>
                  </discovery_config>
                </builtin>
                <propertiesPolicy>
                  <properties>
                    <property><name>dds.sec.auth.plugin</name><value>builtin.PKI-DH</value></property>
                    <property><name>dds.sec.access.plugin</name><value>builtin.Access-Permissions</value></property>
                    <property><name>dds.sec.crypto.plugin</name><value>builtin.AES-GCM-GMAC</value></property>
                    <property><name>dds.sec.auth.builtin.PKI-DH.identity_ca</name><value>file:///certs/identity_ca_cert.pem</value></property>
                    <property><name>dds.sec.auth.builtin.PKI-DH.identity_certificate</name><value>file:///certs/router_final_identity_cert.pem</value></property>
                    <property><name>dds.sec.auth.builtin.PKI-DH.private_key</name><value>file:///certs/router_final_identity_key.pem</value></property>
                    <property><name>dds.sec.access.builtin.Access-Permissions.permissions_ca</name><value>file:///certs/permissions_ca_cert.pem</value></property>
                    <property><name>dds.sec.access.builtin.Access-Permissions.governance</name><value>file:///certs/governance.smime</value></property>
                    <property><name>dds.sec.access.builtin.Access-Permissions.permissions</name><value>file:///certs/router_final_permissions.smime</value></property>
                    <property><name>dds.sec.crypto.builtin.AES-GCM-GMAC.rtps_protection_kind</name><value>ENCRYPT</value></property>
                  </properties>
                </propertiesPolicy>
              </rtps>
            </participant>

            <transport_descriptors>
              <transport_descriptor>
                <transport_id>tcp_wan_Final</transport_id>
                <type>TCPv4</type>
                <listening_ports>
                  <port>31813</port>
                </listening_ports>
                <wan_addr>192.168.56.103</wan_addr>
              </transport_descriptor>
            </transport_descriptors>

            <participant profile_name="WAN_Final_XML_Profile">
              <rtps>
                <name>WanFinal</name>
                <useBuiltinTransports>false</useBuiltinTransports>
                <userTransports>
                  <transport_id>tcp_wan_Final</transport_id>
                </userTransports>
                <builtin>
                  <metatrafficUnicastLocatorList>
                    <locator>
                      <tcpv4>
                        <address>192.168.56.103</address>
                        <physical_port>31813</physical_port>
                        <port>7410</port>
                      </tcpv4>
                    </locator>
                  </metatrafficUnicastLocatorList>
                  <initialPeersList>
                    <locator>
                      <tcpv4>
                        <address>192.168.56.102</address>
                        <physical_port>31811</physical_port>
                        <port>7410</port>
                      </tcpv4>
                    </locator>
                  </initialPeersList>
                </builtin>
                <propertiesPolicy>
                  <properties>
                    <property><name>dds.sec.auth.plugin</name><value>builtin.PKI-DH</value></property>
                    <property><name>dds.sec.access.plugin</name><value>builtin.Access-Permissions</value></property>
                    <property><name>dds.sec.crypto.plugin</name><value>builtin.AES-GCM-GMAC</value></property>
                    <property><name>dds.sec.auth.builtin.PKI-DH.identity_ca</name><value>file:///certs/identity_ca_cert.pem</value></property>
                    <property><name>dds.sec.auth.builtin.PKI-DH.identity_certificate</name><value>file:///certs/router_final_identity_cert.pem</value></property>
                    <property><name>dds.sec.auth.builtin.PKI-DH.private_key</name><value>file:///certs/router_final_identity_key.pem</value></property>
                    <property><name>dds.sec.access.builtin.Access-Permissions.permissions_ca</name><value>file:///certs/permissions_ca_cert.pem</value></property>
                    <property><name>dds.sec.access.builtin.Access-Permissions.governance</name><value>file:///certs/governance.smime</value></property>
                    <property><name>dds.sec.access.builtin.Access-Permissions.permissions</name><value>file:///certs/router_final_permissions.smime</value></property>
                    <property><name>dds.sec.crypto.builtin.AES-GCM-GMAC.rtps_protection_kind</name><value>ENCRYPT</value></property>
                  </properties>
                </propertiesPolicy>
              </rtps>
            </participant>
          </profiles>
        </dds>

    participants:
      - name: "DSClientFinal"
        kind: xml
        profile: "DSClientFinal_XML_Profile"

      - name: "WanFinal"
        kind: xml
        profile: "WAN_Final_XML_Profile"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dds-router-final
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dds-router-final
  template:
    metadata:
      labels:
        app: dds-router-final
    spec:
      nodeName: final
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
      - name: wait-for-discovery
        image: busybox
        command: ['sh', '-c', 'until nc -zu 10.106.45.18 11811; do echo waiting for discovery server final; sleep 2; done']
      containers:
        - name: router
          image: hhlh1/ubuntu-fastdds-suite:v3.2.2-secure
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "400m"
          command: ["/bin/bash", "-c"]
          args:
            - |
              ddsrouter -c /config/router.yaml -d
          volumeMounts:
            - name: config-vol
              mountPath: /config
            - name: certs-vol
              mountPath: /certs
              readOnly: true
      volumes:
        - name: config-vol
          configMap:
            name: dds-router-final-config
        - name: certs-vol
          secret:
            secretName: dds-security-certs